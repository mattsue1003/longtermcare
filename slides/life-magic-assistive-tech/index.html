<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>生活魔法師-以人為本的輔具及智慧科技輔具的認識</title><style>body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;background:#eaf4f0;color:#14221f;display:grid;min-height:100vh;place-items:center}.box{max-width:720px;padding:32px;line-height:1.7}.bar{height:10px;background:#15645f;border-radius:99px;overflow:hidden}.bar:before{content:"";display:block;height:100%;width:45%;background:#b36d1b;animation:load 1.2s infinite alternate}@keyframes load{to{width:100%}}</style></head><body><div class="box"><div class="bar"></div><h1>簡報載入中</h1><p>正在開啟「生活魔法師」課程簡報。若畫面停留太久，請使用最新版 Chrome 開啟。</p></div><script>(async()=>{try{const files=["parts/00.txt","parts/01.txt","parts/02.txt","parts/03.txt","parts/04.txt","parts/05.txt","parts/06.txt","parts/07.txt","parts/08.txt","parts/08b.txt","parts/09.txt","parts/10.txt"];const b64=(await Promise.all(files.map(f=>fetch(f).then(r=>{if(!r.ok)throw new Error(f+' '+r.status);return r.text();})))).join('');const bin=atob(b64);const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);if(!('DecompressionStream' in window))throw new Error('DecompressionStream unavailable');const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));const html=await new Response(stream).text();document.open();document.write(html);document.close();}catch(err){document.body.innerHTML='<div class="box"><h1>無法載入簡報</h1><p>請改用最新版 Chrome 或 Edge 開啟此頁。</p><p>'+String(err.message||err)+'</p></div>';}})();</script></body></html>
